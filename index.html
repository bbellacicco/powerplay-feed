<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerplay Windsor – Sports Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&family=Sigmar&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;--border:rgba(255,255,255,0.07);--accent:#FFB800;--text:#f0f2f5;--text-muted:#7a8090;--green:#2ecc71;--red-wings:#ce1126;--pistons:#c8102e;--lions:#0076b6;--tigers-navy:#0c2340;--blue-jays:#134a8e;--maple-leafs:#00205b;--canadiens:#af1e2d;--raptors:#ce1141;--toronto-fc:#e31837}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text)}
#ppw-widget{width:100%;max-width:960px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ppw-header{background:linear-gradient(135deg,#0a0c10 0%,#1a1e28 100%);border-bottom:2px solid #FFB800;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.ppw-logo{display:flex;align-items:center;gap:12px}
.ppw-logo-icon{width:84px;height:84px;background:transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#FFB800;letter-spacing:-1px}
.ppw-logo-text{font-family:'Sigmar',cursive;font-weight:400;font-size:28px;letter-spacing:2px;line-height:1.1;color:#FFB800;font-style:italic}
.ppw-logo-sub{font-size:11px;color:rgba(255,209,102,0.6);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.ppw-refresh-btn{background:rgba(255,209,102,0.15);border:1px solid rgba(255,209,102,0.4);color:#FFB800;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border-radius:6px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.ppw-refresh-btn:hover{background:rgba(255,209,102,0.3);border-color:#FFB800}
.ppw-refresh-btn:disabled{opacity:0.5;cursor:not-allowed}
.ppw-view-toggle{background:#0d0f14;border-bottom:1px solid var(--border);padding:0 16px;display:flex}
.ppw-view-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:12px 20px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.ppw-view-btn:hover{color:var(--text)}
.ppw-view-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.ppw-league-filters{background:#0d0f14;padding:8px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border)}
.ppw-league-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s}
.ppw-league-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
.ppw-league-btn.active{background:var(--accent);color:#0a0c10;border-color:var(--accent)}
.ppw-filters{background:var(--surface);padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ppw-filter-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.ppw-filter-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
.ppw-filter-btn.active{color:white;border-color:transparent}
.ppw-filter-btn[data-team="All"].active{background:var(--accent);color:#0a0c10}
.ppw-filter-btn[data-team="Red Wings"].active{background:var(--red-wings)}
.ppw-filter-btn[data-team="Pistons"].active{background:var(--pistons)}
.ppw-filter-btn[data-team="Lions"].active{background:var(--lions)}
.ppw-filter-btn[data-team="Tigers"].active{background:var(--tigers-navy);border-color:#FFB800!important}
.ppw-filter-btn[data-team="Blue Jays"].active{background:var(--blue-jays)}
.ppw-filter-btn[data-team="Maple Leafs"].active{background:var(--maple-leafs)}
.ppw-filter-btn[data-team="Canadiens"].active{background:var(--canadiens)}
.ppw-filter-btn[data-team="Raptors"].active{background:var(--raptors)}
.ppw-filter-btn[data-team="Toronto FC"].active{background:var(--toronto-fc)}
.team-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.ppw-content{padding:20px;min-height:420px}
.ppw-status{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-size:12px;color:var(--text-muted);font-weight:500}
.ppw-live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ppw-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px}
.ppw-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ppw-loading p{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}
.ppw-error{text-align:center;padding:48px 20px;color:var(--text-muted)}
.ppw-error-icon{font-size:36px;margin-bottom:12px}
.ppw-error h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;margin-bottom:8px;color:var(--text)}
.ppw-error p{font-size:14px;line-height:1.5}
.ppw-stories{display:flex;flex-direction:column;gap:12px}
.ppw-story-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:all 0.2s;border-left:3px solid transparent;animation:fadeUp 0.4s ease forwards;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ppw-story-card:hover{background:var(--surface2);border-color:rgba(255,255,255,0.12);transform:translateX(2px)}
.ppw-story-card[data-team="Red Wings"]{border-left-color:var(--red-wings)}
.ppw-story-card[data-team="Pistons"]{border-left-color:var(--pistons)}
.ppw-story-card[data-team="Lions"]{border-left-color:var(--lions)}
.ppw-story-card[data-team="Tigers"]{border-left-color:#FFB800}
.ppw-story-card[data-team="Blue Jays"]{border-left-color:var(--blue-jays)}
.ppw-story-card[data-team="Maple Leafs"]{border-left-color:var(--maple-leafs)}
.ppw-story-card[data-team="Canadiens"]{border-left-color:var(--canadiens)}
.ppw-story-card[data-team="Raptors"]{border-left-color:var(--raptors)}
.ppw-story-card[data-team="Toronto FC"]{border-left-color:var(--toronto-fc)}
.ppw-story-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.ppw-team-badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px;color:white}
.badge-Red-Wings{background:var(--red-wings)}
.badge-Pistons{background:var(--pistons)}
.badge-Lions{background:var(--lions)}
.badge-Tigers{background:var(--tigers-navy);color:#FFB800;border:1px solid #FFB800}
.badge-Blue-Jays{background:var(--blue-jays)}
.badge-Maple-Leafs{background:var(--maple-leafs)}
.badge-Canadiens{background:var(--canadiens)}
.badge-Raptors{background:var(--raptors);color:white}
.badge-NHL{background:#0076b6;color:white}
.badge-NBA{background:#c8102e;color:white}
.badge-MLB{background:#002d72;color:white}
.badge-Toronto-FC{background:var(--toronto-fc);color:white}
.ppw-story-source{font-size:11px;color:var(--text-muted);font-weight:500}
.ppw-story-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;line-height:1.25;color:var(--text);margin-bottom:6px}
.ppw-story-snippet{font-size:13px;line-height:1.55;color:var(--text-muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ppw-games-grid{display:flex;flex-direction:column;gap:10px}
.ppw-section-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:4px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px}
.ppw-game-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:16px;animation:fadeUp 0.4s ease forwards;opacity:0;transition:background 0.2s;border-left:3px solid transparent}
.ppw-game-card:hover{background:var(--surface2)}
.ppw-game-card[data-team="Red Wings"]{border-left-color:var(--red-wings)}
.ppw-game-card[data-team="Pistons"]{border-left-color:var(--pistons)}
.ppw-game-card[data-team="Lions"]{border-left-color:var(--lions)}
.ppw-game-card[data-team="Tigers"]{border-left-color:#FFB800}
.ppw-game-card[data-team="Blue Jays"]{border-left-color:var(--blue-jays)}
.ppw-game-card[data-team="Maple Leafs"]{border-left-color:var(--maple-leafs)}
.ppw-game-card[data-team="Canadiens"]{border-left-color:var(--canadiens)}
.ppw-game-card[data-team="Raptors"]{border-left-color:var(--raptors)}
.ppw-game-card[data-team="Toronto FC"]{border-left-color:var(--toronto-fc)}
.ppw-game-date{min-width:52px;text-align:center}
.ppw-game-date-day{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;line-height:1;color:var(--text)}
.ppw-game-date-mon{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
.ppw-game-divider{width:1px;height:40px;background:var(--border);flex-shrink:0}
.ppw-game-matchup{flex:1;min-width:0}
.ppw-game-teams{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;line-height:1.2;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ppw-game-teams .vs{color:var(--text-muted);font-weight:400;font-size:14px}
.ppw-game-venue{font-size:12px;color:var(--text-muted)}
.ppw-game-right{text-align:right;flex-shrink:0}
.ppw-game-time{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--text);white-space:nowrap}
.ppw-game-tv{font-size:11px;color:var(--text-muted);margin-top:2px}
.ppw-footer{background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-muted)}
.ppw-footer a{color:var(--accent);text-decoration:none;font-weight:600}
@media(max-width:640px){.ppw-header{padding:14px 16px}.ppw-content{padding:14px}.ppw-story-title{font-size:15px}.ppw-game-card{flex-wrap:wrap;gap:10px}}
</style>
</head>

  { name:'Raptors',     espnId:28,  sport:'basketball', league:'nba',      schedule:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/28/schedule' },
  { name:'Toronto FC',  espnId:7318,sport:'soccer',     league:'usa.1',    schedule:'https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams/7318/schedule' }
];

// Use ESPN team IDs to match news from categories
var TEAM_ESPN_IDS = {
  'Red Wings':   5,
  'Pistons':     8,
  'Lions':       8,
  'Tigers':      6,
  'Blue Jays':   28,
  'Maple Leafs': 21,
  'Canadiens':   10,
  'Raptors':     28,
  'Toronto FC':  7318
};

// League news — confirmed working endpoints
var NEWS_URLS = [
  { url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/news?limit=50',     teams:['Red Wings','Maple Leafs','Canadiens'] },
  { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/news?limit=50',  teams:['Pistons'] },
  { url:'https://site.api.espn.com/apis/site/v2/sports/football/nfl/news?limit=50',    teams:['Lions'] },
  { url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/news?limit=50',    teams:['Tigers','Blue Jays'] },
  { url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/news?limit=20',     teams:['_NHL'] },
  { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/news?limit=20', teams:['_NBA'] },
  { url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/news?limit=20',   teams:['_MLB'] }
];

// ESPN team IDs for category matching
var TEAM_IDS = { 'Red Wings':5, 'Pistons':8, 'Lions':8, 'Tigers':6, 'Blue Jays':28, 'Maple Leafs':21, 'Canadiens':10 };
var TEAM_KW  = { 'Red Wings':['red wings'],'Pistons':['pistons'],'Lions':['detroit lions'],'Tigers':['detroit tigers'],'Blue Jays':['blue jays'],'Maple Leafs':['maple leafs'],'Canadiens':['canadiens'] };

var allStories = [], allGames = [];
var activeLeague = '';
var activeTeam = 'All', activeView = 'news';
var lastFetch = null;
var leagueStories = { NHL:[], NBA:[], MLB:[] };
var leagueGames   = { NHL:[], NBA:[], MLB:[] };

function filterLeague(league){
  if(activeLeague === league){
    // Toggle off
    activeLeague = '';
    document.querySelectorAll('.ppw-league-btn').forEach(function(b){ b.classList.remove('active'); });
  } else {
    activeLeague = league;
    document.querySelectorAll('.ppw-league-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.league===league); });
    // Clear team filter when league selected
    activeTeam = 'All';
    document.querySelectorAll('.ppw-filter-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.team==='All'); });
  }
  render();
}

function switchView(v){
  activeView=v;
  document.getElementById('btn-news').classList.toggle('active',v==='news');
  document.getElementById('btn-games').classList.toggle('active',v==='games');
  render();
}

function filterTeam(t){
  activeTeam=t;
  // Clear league filter when team selected
  activeLeague='';
  document.querySelectorAll('.ppw-league-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.ppw-filter-btn').forEach(function(b){ b.classList.toggle('active',b.dataset.team===t); });
  render();
}

function loadAll(){
  var btn=document.getElementById('ppw-refresh-btn');
  var icon=document.getElementById('ppw-refresh-icon');
  if(btn) btn.disabled=true;
  if(icon) icon.style.cssText='animation:spin 0.8s linear infinite;display:inline-block;';
  setContent('<div class="ppw-loading"><div class="ppw-spinner"></div><p>Loading feed...</p></div>');
  allStories=[]; allGames=[];

  var newsPromises = NEWS_URLS.map(function(feed){
    return fetch(feed.url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var articles = data.articles || [];
        articles.forEach(function(a){
          var cats = (a.categories||[]).filter(function(c){return c.type==='team';}).map(function(c){return c.teamId;});
          var title = (a.headline||'').toLowerCase();
          var desc  = (a.description||'').toLowerCase();
          var combined = title + ' ' + desc;

          // Try to match to a specific team first
          var matched = false;
          feed.teams.forEach(function(teamName){
            if(matched) return;
            var byId = cats.indexOf(TEAM_IDS[teamName]) >= 0;
            var byKw = (TEAM_KW[teamName]||[]).some(function(k){ return combined.indexOf(k)>=0; });
            if(byId || byKw){
              matched = true;
              var exists = allStories.some(function(s){ return s.title===(a.headline||''); });
              if(!exists){
                allStories.push({
                  team: teamName,
                  title: a.headline||'',
                  snippet: (a.description||'').substring(0,160),
                  source: 'ESPN',
                  url: a.links&&a.links.web ? a.links.web.href : ''
                });
              }
            }
          });


        });
      }).catch(function(){});
  });

  var gamePromises = TEAMS.map(function(team){
    return fetch(team.schedule)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var events = data.events || [];
        var now = new Date();
        var upcoming = events.filter(function(e){
          return new Date(e.date) > now;
        }).slice(0,3);
        upcoming.forEach(function(e){
          var comp = e.competitions && e.competitions[0];
          if(!comp) return;
          var home = comp.competitors.find(function(c){ return c.homeAway==='home'; });
          var away = comp.competitors.find(function(c){ return c.homeAway==='away'; });
          if(!home||!away) return;
          var namePart = team.name.toLowerCase().split(' ').pop();
          var isHome = (home.team.displayName||'').toLowerCase().indexOf(namePart)>=0 ||
                       (home.team.shortDisplayName||'').toLowerCase().indexOf(namePart)>=0;
          var opponent = isHome ? (away.team.shortDisplayName||away.team.displayName) : (home.team.shortDisplayName||home.team.displayName);
          var d = new Date(e.date);
          var tv = comp.broadcasts && comp.broadcasts[0] && comp.broadcasts[0].names ? comp.broadcasts[0].names[0] : '';
          allGames.push({
            team: team.name,
            day: d.getDate().toString(),
            month: d.toLocaleDateString('en-US',{month:'short'}),
            homeAway: isHome ? 'vs' : '@',
            opponent: opponent,
            time: d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})+' ET',
            venue: comp.venue ? comp.venue.fullName : '',
            tv: tv,
            rawDate: e.date
          });
        });
      }).catch(function(){});
  });

  // Raptors recaps from scoreboard
  var raptorsRecapPromise = fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/28/schedule')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var events = data.events || [];
      var now = new Date();
      var past = events.filter(function(e){ return new Date(e.date) < now; }).slice(-5).reverse();
      past.forEach(function(e){
        var comp = e.competitions && e.competitions[0];
        if(!comp) return;
        var home = comp.competitors.find(function(c){ return c.homeAway==='home'; });
        var away = comp.competitors.find(function(c){ return c.homeAway==='away'; });
        if(!home||!away) return;
        var homeScore = home.score || '';
        var awayScore = away.score || '';
        var result = (home.team.displayName||'') + ' ' + homeScore + ' - ' + (away.team.displayName||'') + ' ' + awayScore;
        // Check which competitor is the Raptors by abbreviation
        var rapComp = comp.competitors.find(function(c){ return (c.team.abbreviation||'').toUpperCase() === 'TOR'; });
        var oppComp = comp.competitors.find(function(c){ return (c.team.abbreviation||'').toUpperCase() !== 'TOR'; });
        if(!rapComp || !oppComp) return;
        var rapScore = rapComp.score;
        var oppScore = oppComp.score;
        var hasScore = rapScore && oppScore && rapScore !== '0' && oppScore !== '0';
        var rapWon = hasScore ? parseInt(rapScore) > parseInt(oppScore) : null;
        var opponent = oppComp.team.shortDisplayName || oppComp.team.displayName || 'Opponent';
        var d = new Date(e.date);
        var dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        var title = hasScore
          ? (rapWon ? 'W ' : 'L ') + rapScore + '-' + oppScore + ' vs ' + opponent
          : 'vs ' + opponent;
        allStories.push({
          team: 'Raptors',
          title: title,
          snippet: dateStr + ' · ' + (comp.venue ? comp.venue.fullName : ''),
          source: 'ESPN',
          url: 'https://www.espn.com/nba/team/_/name/tor/toronto-raptors'
        });
      });
    }).catch(function(){});

  // League news — top 3 from each league
  var today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  var leagueNewsPromises = [
    { league:'NHL', url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/news?limit=3' },
    { league:'NBA', url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/news?limit=3' },
    { league:'MLB', url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/news?limit=3' }
  ].map(function(feed){
    return fetch(feed.url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        leagueStories[feed.league] = (data.articles||[]).slice(0,3).map(function(a){
          return {
            title: a.headline||'',
            snippet: (a.description||'').substring(0,160),
            url: a.links&&a.links.web ? a.links.web.href : ''
          };
        });
      }).catch(function(){});
  });

  // League scoreboard — 5 games for today
  var leagueGamesPromises = [
    { league:'NHL', url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard?dates='+today },
    { league:'NBA', url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates='+today },
    { league:'MLB', url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard?dates='+today }
  ].map(function(feed){
    return fetch(feed.url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var events = (data.events||[]).slice(0,5);
        leagueGames[feed.league] = events.map(function(e){
          var comp = e.competitions&&e.competitions[0];
          if(!comp) return null;
          var home = comp.competitors.find(function(c){ return c.homeAway==='home'; });
          var away = comp.competitors.find(function(c){ return c.homeAway==='away'; });
          if(!home||!away) return null;
          var d = new Date(e.date);
          var status = comp.status&&comp.status.type ? comp.status.type.description : '';
          var homeScore = home.score||'';
          var awayScore = away.score||'';
          var scoreStr = (homeScore&&awayScore) ? homeScore+'-'+awayScore : '';
          return {
            home: home.team.shortDisplayName||home.team.displayName,
            away: away.team.shortDisplayName||away.team.displayName,
            time: status==='Final' ? 'Final' : d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})+' ET',
            score: scoreStr,
            status: status
          };
        }).filter(Boolean);
      }).catch(function(){});
  });

  Promise.all(newsPromises.concat(gamePromises).concat([raptorsRecapPromise]).concat(leagueNewsPromises).concat(leagueGamesPromises)).then(function(){
    lastFetch = new Date();
    render();
    if(btn) btn.disabled=false;
    if(icon) icon.style.cssText='';
  }).catch(function(){
    setContent('<div class="ppw-error"><div class="ppw-error-icon">⚠️</div><h3>Could not load</h3><p>Please try refreshing.</p></div>');
    if(btn) btn.disabled=false;
    if(icon) icon.style.cssText='';
  });
}

function render(){ if(activeView==='news') renderNews(); else renderGames(); }

function renderNews(){
  var stories;
  if(activeLeague){
    var ls = leagueStories[activeLeague]||[];
    if(!ls.length){ setContent('<div class="ppw-error"><div class="ppw-error-icon">📭</div><h3>No stories found</h3><p>Try refreshing.</p></div>'); return; }
    var t2 = lastFetch ? lastFetch.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
    setContent('<div class="ppw-status"><span><span class="ppw-live-dot"></span>'+ls.length+' stories · Updated '+t2+'</span><span>'+activeLeague+'</span></div><div class="ppw-stories" id="ppw-list"></div>');
    var list2=document.getElementById('ppw-list');
    ls.forEach(function(s,i){
      var card=document.createElement('div');
      card.className='ppw-story-card'; card.style.animationDelay=i*0.03+'s';
      card.style.borderLeftColor='var(--accent)';
      var inner2='<div class="ppw-story-meta"><span class="ppw-team-badge" style="background:#333;color:white">'+activeLeague+'</span><span class="ppw-story-source">ESPN</span></div><div class="ppw-story-title">'+esc(s.title)+'</div><div class="ppw-story-snippet">'+esc(s.snippet)+'</div>';
      card.innerHTML=s.url?'<a href="'+esc(s.url)+'" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:block;">'+inner2+'</a>':inner2;
      list2.appendChild(card);
    });
    return;
  } else {
    stories = activeTeam==='All' ? allStories.filter(function(s){ return s.team.indexOf('_')!==0; }) : allStories.filter(function(s){ return s.team===activeTeam; });
  }
  if(!stories.length){ setContent('<div class="ppw-error"><div class="ppw-error-icon">📭</div><h3>No stories found</h3><p>Try refreshing.</p></div>'); return; }
  var t = lastFetch ? lastFetch.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
  setContent('<div class="ppw-status"><span><span class="ppw-live-dot"></span>'+stories.length+' stories · Updated '+t+'</span><span>'+(activeTeam==='All'?'All 7 teams':activeTeam)+'</span></div><div class="ppw-stories" id="ppw-list"></div>');
  var list=document.getElementById('ppw-list');
  stories.forEach(function(s,i){
    var badge='badge-'+(s.team.indexOf('_')===0 ? s.team.substring(1) : s.team.replace(/\s+/g,'-'));
    var displayTeam = s.team.indexOf('_')===0 ? s.team.substring(1) : s.team;
    var card=document.createElement('div');
    card.className='ppw-story-card'; card.dataset.team=s.team; card.style.animationDelay=i*0.03+'s';
    var inner='<div class="ppw-story-meta"><span class="ppw-team-badge '+badge+'">'+esc(displayTeam)+'</span><span class="ppw-story-source">'+esc(s.source)+'</span></div><div class="ppw-story-title">'+esc(s.title)+'</div><div class="ppw-story-snippet">'+esc(s.snippet)+'</div>';
    card.innerHTML=s.url?'<a href="'+esc(s.url)+'" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:block;">'+inner+'</a>':inner;
    list.appendChild(card);
  });
}

function renderGames(){
  var games;
  if(activeLeague){
    var lg = leagueGames[activeLeague]||[];
    if(!lg.length){ setContent('<div class="ppw-error"><div class="ppw-error-icon">📭</div><h3>No games today</h3><p>Check back later.</p></div>'); return; }
    var t3 = lastFetch ? lastFetch.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
    setContent('<div class="ppw-status"><span><span class="ppw-live-dot"></span>'+lg.length+' games today · Updated '+t3+'</span><span>'+activeLeague+'</span></div><div class="ppw-section-label">Today's '+activeLeague+' Games</div><div class="ppw-games-grid" id="ppw-list"></div>');
    var list3=document.getElementById('ppw-list');
    lg.forEach(function(g,i){
      var card=document.createElement('div');
      card.className='ppw-game-card'; card.style.animationDelay=i*0.03+'s';
      card.style.borderLeftColor='var(--accent)';
      card.innerHTML='<div class="ppw-game-matchup"><div class="ppw-game-teams">'+esc(g.away)+' <span class="vs">@</span> '+esc(g.home)+'</div></div><div class="ppw-game-right"><div class="ppw-game-time">'+(g.score?esc(g.score)+' · ':'')+esc(g.time)+'</div></div>';
      list3.appendChild(card);
    });
    return;
  } else {
    games = activeTeam==='All' ? allGames : allGames.filter(function(g){ return g.team===activeTeam; });
  }
  if(!games.length){ setContent('<div class="ppw-error"><div class="ppw-error-icon">📭</div><h3>No upcoming games</h3><p>Team may be in off-season.</p></div>'); return; }
  var t = lastFetch ? lastFetch.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
  setContent('<div class="ppw-status"><span><span class="ppw-live-dot"></span>'+games.length+' upcoming games · Updated '+t+'</span><span>'+(activeTeam==='All'?'All 7 teams':activeTeam)+'</span></div><div class="ppw-section-label">Next scheduled games</div><div class="ppw-games-grid" id="ppw-list"></div>');
  var list=document.getElementById('ppw-list');
  games.forEach(function(g,i){
    var badge='badge-'+g.team.replace(/\s+/g,'-');
    var card=document.createElement('div');
    card.className='ppw-game-card'; card.dataset.team=g.team; card.style.animationDelay=i*0.03+'s';
    card.innerHTML='<div class="ppw-game-date"><div class="ppw-game-date-day">'+esc(g.day)+'</div><div class="ppw-game-date-mon">'+esc(g.month)+'</div></div><div class="ppw-game-divider"></div><div class="ppw-game-matchup"><div class="ppw-game-teams"><span class="ppw-team-badge '+badge+'">'+esc(g.team)+'</span><span class="vs">'+esc(g.homeAway)+'</span> '+esc(g.opponent)+'</div><div class="ppw-game-venue">📍 '+esc(g.venue)+'</div></div><div class="ppw-game-right"><div class="ppw-game-time">'+esc(g.time)+'</div><div class="ppw-game-tv">'+esc(g.tv)+'</div></div>';
    list.appendChild(card);
  });
}

function setContent(h){ var e=document.getElementById('ppw-content'); if(e) e.innerHTML=h; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.addEventListener('DOMContentLoaded', loadAll);
setInterval(loadAll, 12*60*60*1000);
</script>
</body>
</html>
