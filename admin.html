<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Powerplay Windsor – Ticker Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;--border:rgba(255,255,255,0.08);--accent:#FFB800;--text:#f0f2f5;--text-muted:#7a8090;--red:#e8323a;--green:#2ecc71}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);margin-bottom:4px}
.subtitle{font-size:12px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:24px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--accent);margin-bottom:14px;text-transform:uppercase}

label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:12px}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:70px}
select option{background:var(--surface2)}

.btn{width:100%;padding:12px;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#0a0c10}
.btn-primary:hover{background:#e6a600}
.btn-danger{background:var(--red);color:white;margin-top:8px}
.btn-danger:hover{background:#c9282f}

.items-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.item-content{flex:1;min-width:0}
.item-type{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:4px}
.type-score{background:var(--red);color:white}
.type-news{background:#0076b6;color:white}
.type-update{background:#2ecc71;color:#0a0c10}
.item-text{font-size:13px;color:var(--text);line-height:1.4}
.item-time{font-size:10px;color:var(--text-muted);margin-top:4px}
.delete-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:0;line-height:1;flex-shrink:0}
.delete-btn:hover{color:var(--red)}

.status{text-align:center;padding:8px;border-radius:6px;font-size:13px;font-weight:600;margin-top:8px;display:none}
.status.success{background:rgba(46,204,113,0.15);color:var(--green);border:1px solid rgba(46,204,113,0.3);display:block}
.status.error{background:rgba(232,50,58,0.15);color:var(--red);border:1px solid rgba(232,50,58,0.3);display:block}

.pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;z-index:100}
.pin-screen h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);margin-bottom:8px}
.pin-screen p{font-size:13px;color:var(--text-muted);margin-bottom:24px;text-align:center}
.pin-input{width:100%;max-width:280px;text-align:center;font-size:24px;letter-spacing:8px;padding:14px}
.pin-btn{width:100%;max-width:280px;margin-top:12px}
.pin-error{color:var(--red);font-size:13px;margin-top:8px;display:none}
</style>
</head>
<body>

<!-- PIN Screen -->
<div class="pin-screen" id="pin-screen">
  <h2>🏒 Admin Access</h2>
  <p>Enter your PIN to manage the ticker</p>
  <input class="pin-input" type="password" id="pin-input" placeholder="••••" maxlength="6" inputmode="numeric" />
  <button class="btn btn-primary pin-btn" onclick="checkPin()">Enter</button>
  <div class="pin-error" id="pin-error">Incorrect PIN. Try again.</div>
</div>

<!-- Main Admin -->
<div id="main" style="display:none;max-width:500px;margin:0 auto">
  <h1>Powerplay Windsor</h1>
  <div class="subtitle">Ticker Admin Panel</div>

  <!-- Add Item -->
  <div class="card">
    <div class="card-title">Add Ticker Item</div>
    <label>Type</label>
    <select id="item-type">
      <option value="score">🏆 Score</option>
      <option value="news">📰 News</option>
      <option value="update">🔔 Update</option>
    </select>
    <label>Team (optional)</label>
    <input type="text" id="item-team" placeholder="e.g. Red Wings, Pistons..." />
    <label>Message</label>
    <textarea id="item-text" placeholder="e.g. Red Wings 4 - Leafs 2 · Final"></textarea>
    <button class="btn btn-primary" onclick="addItem()">Add to Ticker</button>
    <div class="status" id="add-status"></div>
  </div>

  <!-- Current Items -->
  <div class="card">
    <div class="card-title">Live Ticker Items</div>
    <div id="items-list"><div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">No items yet</div></div>
    <button class="btn btn-danger" onclick="clearAll()" style="margin-top:12px">Clear All Items</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'ppw_ticker_items';
const PIN = '1966'; // Change this to your preferred PIN

function checkPin() {
  var val = document.getElementById('pin-input').value;
  if(val === PIN) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    loadItems();
  } else {
    document.getElementById('pin-error').style.display = 'block';
    document.getElementById('pin-input').value = '';
  }
}

document.getElementById('pin-input').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') checkPin();
});

function getItems() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}

function saveItems(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function addItem() {
  var type = document.getElementById('item-type').value;
  var team = document.getElementById('item-team').value.trim();
  var text = document.getElementById('item-text').value.trim();
  var status = document.getElementById('add-status');

  if(!text) {
    status.className = 'status error';
    status.textContent = 'Please enter a message.';
    return;
  }

  var items = getItems();
  items.unshift({
    id: Date.now(),
    type: type,
    team: team,
    text: text,
    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  });

  // Keep max 20 items
  if(items.length > 20) items = items.slice(0, 20);
  saveItems(items);

  document.getElementById('item-team').value = '';
  document.getElementById('item-text').value = '';

  status.className = 'status success';
  status.textContent = '✅ Added to ticker!';
  setTimeout(function() { status.className = 'status'; }, 3000);

  loadItems();
}

function deleteItem(id) {
  var items = getItems().filter(function(i) { return i.id !== id; });
  saveItems(items);
  loadItems();
}

function clearAll() {
  if(confirm('Clear all ticker items?')) {
    saveItems([]);
    loadItems();
  }
}

function loadItems() {
  var items = getItems();
  var list = document.getElementById('items-list');
  if(!items.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">No items yet</div>';
    return;
  }
  list.innerHTML = '<div class="items-list">' + items.map(function(item) {
    return '<div class="item">' +
      '<div class="item-content">' +
        '<span class="item-type type-' + item.type + '">' + item.type + '</span>' +
        (item.team ? ' <strong style="font-size:11px;color:var(--accent)">' + esc(item.team) + '</strong>' : '') +
        '<div class="item-text">' + esc(item.text) + '</div>' +
        '<div class="item-time">' + item.time + '</div>' +
      '</div>' +
      '<button class="delete-btn" onclick="deleteItem(' + item.id + ')">✕</button>' +
    '</div>';
  }).join('') + '</div>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
