<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
.ticker-wrap{
  display:flex;
  align-items:center;
  height:44px;
  width:100%;
  background:#000;
  overflow:hidden;
}
.ticker-outer{
  overflow:hidden;
  flex:1;
  height:100%;
  display:flex;
  align-items:center;
}
.ticker-track{
  display:flex;
  align-items:center;
  white-space:nowrap;
  will-change:transform;
}
.ticker-item{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:0 32px;
  font-family:Arial,sans-serif;
  font-size:13px;
  font-weight:600;
  color:#FFB800;
}
.badge{
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:2px 6px;
  border-radius:3px;
  flex-shrink:0;
}
.badge-score{background:#e8323a;color:#fff}
.badge-news{background:#0076b6;color:#fff}
.badge-update{background:#FFB800;color:#000}
.team{color:#fff;font-weight:700}
.sep{color:rgba(255,184,0,0.3);padding:0 4px;font-size:18px;font-family:Arial}
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker-outer">
    <div class="ticker-track" id="track">
      <div class="ticker-item" style="color:rgba(255,184,0,0.4)">Loading...</div>
    </div>
  </div>
</div>

<script>
var SHEET_ID = '1-wAZ-NTyz5v-LbP2hMEB-BGdJcVPC72ZJK1bo6dAiCM';
var CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=Sheet1';

var track = document.getElementById('track');
var pos = 0;
var half = 0;
var raf;

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseCSV(text) {
  var lines = text.trim().split('\n');
  var items = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = lines[i].match(/(".*?"|[^,]+)(?=,|$)/g);
    if (!cols || cols.length < 3) continue;
    var type = cols[0].replace(/"/g,'').trim().toLowerCase();
    var team = cols[1].replace(/"/g,'').trim();
    var text = cols[2].replace(/"/g,'').trim();
    if (text) items.push({type: type, team: team, text: text});
  }
  return items;
}

function buildHTML(items) {
  if (!items.length) {
    return '<div class="ticker-item">&#9889; Powerplay Windsor &mdash; Windsor-Essex sports coverage</div><span class="sep">&#9670;</span><div class="ticker-item">&#9889; Powerplay Windsor &mdash; Windsor-Essex sports coverage</div><span class="sep">&#9670;</span>';
  }
  return items.map(function(item) {
    var badgeClass = (item.type === 'score' || item.type === 'news' || item.type === 'update') ? 'badge-' + item.type : 'badge-update';
    return '<div class="ticker-item">' +
      '<span class="badge ' + badgeClass + '">' + esc(item.type) + '</span>' +
      (item.team ? '<span class="team">' + esc(item.team) + '</span>' : '') +
      '<span>' + esc(item.text) + '</span>' +
      '</div><span class="sep">&#9670;</span>';
  }).join('');
}

function renderTicker(items) {
  var html = buildHTML(items);
  track.innerHTML = html + html;
  setTimeout(function() { half = track.scrollWidth / 2; }, 100);
}

function fetchSheet() {
  fetch(CSV_URL)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var items = parseCSV(text);
      if (items.length) {
        pos = 0;
        renderTicker(items);
      }
    })
    .catch(function() {});
}

function animate() {
  if (half > 0) {
    pos += 1;
    if (pos >= half) pos = 0;
    track.style.transform = 'translateX(-' + pos + 'px)';
  }
  raf = requestAnimationFrame(animate);
}

track.addEventListener('mouseenter', function() { cancelAnimationFrame(raf); });
track.addEventListener('mouseleave', function() { raf = requestAnimationFrame(animate); });

fetchSheet();
setInterval(fetchSheet, 15000);
raf = requestAnimationFrame(animate);
</script>
</body>
</html>
