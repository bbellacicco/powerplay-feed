<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerplay Windsor Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;overflow:hidden;font-family:'Barlow',sans-serif}

.ticker-wrap{
  background:#0a0c10;
  border-top:2px solid #FFB800;
  border-bottom:2px solid #FFB800;
  height:44px;
  display:flex;
  align-items:center;
  overflow:hidden;
  position:relative;
  width:100%;
}

.ticker-label{
  background:#FFB800;
  color:#0a0c10;
  font-family:'Bebas Neue',sans-serif;
  font-size:15px;
  letter-spacing:2px;
  padding:0 16px;
  height:100%;
  display:flex;
  align-items:center;
  white-space:nowrap;
  flex-shrink:0;
  z-index:2;
  position:relative;
}

.ticker-label::after{
  content:'';
  position:absolute;
  right:-12px;
  top:0;
  width:0;
  height:0;
  border-top:44px solid transparent;
  border-left:12px solid #FFB800;
}

.ticker-track{
  display:flex;
  align-items:center;
  white-space:nowrap;
  animation:ticker-scroll 30s linear infinite;
  padding-left:40px;
}

.ticker-track:hover{
  animation-play-state:paused;
}

@keyframes ticker-scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.ticker-item{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:0 30px;
  font-size:13px;
  font-weight:600;
  color:#f0f2f5;
  border-right:1px solid rgba(255,184,0,0.3);
}

.ticker-item:last-child{border-right:none}

.ticker-badge{
  font-size:10px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:2px 6px;
  border-radius:3px;
  flex-shrink:0;
}

.badge-score{background:#e8323a;color:white}
.badge-news{background:#0076b6;color:white}
.badge-update{background:#2ecc71;color:#0a0c10}

.ticker-team{
  color:#FFB800;
  font-weight:700;
}

.ticker-empty{
  color:rgba(255,255,255,0.4);
  font-size:13px;
  padding:0 20px;
}

.ticker-dot{
  color:#FFB800;
  font-size:18px;
  padding:0 10px;
}
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-label">🏒 POWERPLAY</div>
  <div style="overflow:hidden;flex:1;position:relative">
    <div class="ticker-track" id="ticker-track">
      <div class="ticker-empty">Loading ticker...</div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'ppw_ticker_items';
const ADMIN_URL = 'https://bbellacicco.github.io/powerplay-feed/admin.html';

function getItems() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}

function renderTicker() {
  var items = getItems();
  var track = document.getElementById('ticker-track');

  if(!items.length) {
    track.innerHTML = '<div class="ticker-empty">⚡ Powerplay Windsor · Your home for Detroit & Toronto sports</div>' +
      '<div class="ticker-dot">·</div>' +
      '<div class="ticker-empty">⚡ Powerplay Windsor · Your home for Detroit & Toronto sports</div>' +
      '<div class="ticker-dot">·</div>';
    return;
  }

  // Duplicate items for seamless loop
  var html = '';
  [items, items].forEach(function(set) {
    set.forEach(function(item) {
      html += '<div class="ticker-item">' +
        '<span class="ticker-badge badge-' + item.type + '">' + item.type + '</span>' +
        (item.team ? '<span class="ticker-team">' + esc(item.team) + '</span>' : '') +
        '<span>' + esc(item.text) + '</span>' +
      '</div>' +
      '<div class="ticker-dot">◆</div>';
    });
  });

  track.innerHTML = html;

  // Adjust animation speed based on content length
  var speed = Math.max(15, items.length * 6);
  track.style.animationDuration = speed + 's';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Initial render
renderTicker();

// Check for updates every 10 seconds
setInterval(renderTicker, 10000);
</script>
</body>
</html>
