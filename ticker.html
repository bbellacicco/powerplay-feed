<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
.ticker-wrap{
  display:flex;
  align-items:center;
  height:44px;
  width:100%;
  background:#000;
  overflow:hidden;
}
.ticker-outer{
  overflow:hidden;
  flex:1;
  height:100%;
  display:flex;
  align-items:center;
}
.ticker-track{
  display:flex;
  align-items:center;
  white-space:nowrap;
  will-change:transform;
}
.ticker-item{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:0 32px;
  font-family:Arial,sans-serif;
  font-size:13px;
  font-weight:600;
  color:#FFB800;
}
.badge{
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:2px 6px;
  border-radius:3px;
  flex-shrink:0;
}
.badge-score{background:#e8323a;color:#fff}
.badge-news{background:#0076b6;color:#fff}
.badge-update{background:#FFB800;color:#000}
.team{color:#fff;font-weight:700}
.sep{color:rgba(255,184,0,0.3);padding:0 4px;font-size:18px;font-family:Arial}
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker-outer">
    <div class="ticker-track" id="track">
      <div class="ticker-item" style="color:rgba(255,184,0,0.4)">Loading...</div>
    </div>
  </div>
</div>

<script>
var SHEET_ID = '1-wAZ-NTyz5v-LbP2hMEB-BGdJcVPC72ZJK1bo6dAiCM';
var CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=Sheet1&cachebust=' + Date.now();

var track = document.getElementById('track');
var pos = 0;
var half = 0;
var raf;
var lastTime = null;
var SPEED = 40; // pixels per second — consistent on all devices

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseCSV(text) {
  var lines = text.trim().split('\n');
  var items = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i];
    var cols = [];
    var current = '';
    var inQuotes = false;
    for (var c = 0; c < line.length; c++) {
      var ch = line[c];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    cols.push(current.trim());
    if (cols.length < 3) continue;
    var type = cols[0].toLowerCase().trim();
    var team = cols[1].trim();
    var text = cols[2].trim();
    if (text) items.push({type: type, team: team, text: text});
  }
  return items;
}

function buildHTML(items) {
  if (!items.length) {
    var d = '<div class="ticker-item">&#9889; Powerplay Windsor &mdash; Windsor-Essex sports coverage</div><span class="sep">&#9670;</span>';
    return d + d;
  }
  return items.map(function(item) {
    var t = (item.type === 'score' || item.type === 'news' || item.type === 'update') ? item.type : 'update';
    return '<div class="ticker-item">' +
      '<span class="badge badge-' + t + '">' + esc(item.type) + '</span>' +
      (item.team ? '<span class="team">' + esc(item.team) + ' </span>' : '') +
      '<span>' + esc(item.text) + '</span>' +
      '</div><span class="sep">&#9670;</span>';
  }).join('');
}

function renderTicker(items) {
  var html = buildHTML(items);
  track.innerHTML = html + html;
  pos = 0;
  lastTime = null;
  setTimeout(function() {
    half = track.scrollWidth / 2;
  }, 200);
}

function fetchSheet() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=Sheet1&cachebust=' + Date.now();
  fetch(url, {cache: 'no-store'})
    .then(function(r) {
      if (!r.ok) throw new Error('fetch failed');
      return r.text();
    })
    .then(function(text) {
      var items = parseCSV(text);
      if (items.length) renderTicker(items);
    })
    .catch(function() {
      setTimeout(fetchSheet, 5000);
    });
}

function animate(timestamp) {
  if (half > 0) {
    if (lastTime === null) lastTime = timestamp;
    var delta = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (delta > 0.1) delta = 0.1; // cap big gaps (tab switching, sleep)
    pos += SPEED * delta;
    if (pos >= half) pos = pos - half;
    track.style.transform = 'translateX(-' + pos.toFixed(2) + 'px)';
  }
  raf = requestAnimationFrame(animate);
}

fetchSheet();
setInterval(fetchSheet, 20000);
raf = requestAnimationFrame(animate);
</script>
</body>
</html>
