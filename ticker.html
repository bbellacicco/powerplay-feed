<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:44px;background:#000;overflow:hidden}
#ticker-viewport{
  width:100%;
  height:44px;
  overflow:hidden;
  position:relative;
  background:#000;
}
#ticker-stage{
  position:absolute;
  top:0;
  left:0;
  height:44px;
  display:flex;
  align-items:center;
  white-space:nowrap;
}
.ticker-item{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:0 32px;
  font-family:Arial,sans-serif;
  font-size:13px;
  font-weight:600;
  color:#FFB800;
  height:44px;
  box-sizing:border-box;
}
.badge{
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:2px 6px;
  border-radius:3px;
  flex-shrink:0;
}
.badge-score{background:#e8323a;color:#fff}
.badge-news{background:#0076b6;color:#fff}
.badge-update{background:#FFB800;color:#000}
.badge-upcoming{background:#9b59b6;color:#fff}
.badge-default{background:#555;color:#fff}
.team{color:#fff;font-weight:700}
.sep{
  color:rgba(255,184,0,0.3);
  font-size:18px;
  font-family:Arial;
  padding:0 4px;
  display:inline-block;
  height:44px;
  line-height:44px;
}
</style>
</head>
<body>
<div id="ticker-viewport">
  <div id="ticker-stage"></div>
</div>
<script>
var SHEET_ID = '1-wAZ-NTyz5v-LbP2hMEB-BGdJcVPC72ZJK1bo6dAiCM';
var SPEED = 50; // pixels per second

var stage = document.getElementById('ticker-stage');
var x = 0;
var loopWidth = 0;
var lastT = null;
var raf = null;
var running = false;

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function badgeClass(t){
  t = t.toLowerCase().trim();
  if(t==='score') return 'badge-score';
  if(t==='news') return 'badge-news';
  if(t==='update') return 'badge-update';
  if(t==='upcoming') return 'badge-upcoming';
  return 'badge-default';
}

function parseCSV(text){
  var lines = text.trim().split('\n');
  var items = [];
  for(var i=1;i<lines.length;i++){
    var line=lines[i], cols=[], cur='', inQ=false;
    for(var c=0;c<line.length;c++){
      var ch=line[c];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    if(cols.length<3) continue;
    var type=cols[0].trim(), team=cols[1].trim(), text=cols[2].trim();
    if(text) items.push({type:type,team:team,text:text});
  }
  return items;
}

function makeNode(item){
  var wrap = document.createElement('div');
  wrap.className = 'ticker-item';
  var badge = document.createElement('span');
  badge.className = 'badge ' + badgeClass(item.type);
  badge.textContent = item.type;
  wrap.appendChild(badge);
  if(item.team){
    var team = document.createElement('span');
    team.className = 'team';
    team.textContent = item.team + ' ';
    wrap.appendChild(team);
  }
  var txt = document.createElement('span');
  txt.textContent = item.text;
  wrap.appendChild(txt);
  return wrap;
}

function makeSep(){
  var s = document.createElement('span');
  s.className = 'sep';
  s.innerHTML = '&#9670;';
  return s;
}

function buildStage(items){
  // Stop any running animation
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  running = false;
  stage.innerHTML = '';
  stage.style.transform = 'translateX(0)';
  x = 0;
  lastT = null;

  if(!items || !items.length){
    var d = document.createElement('div');
    d.className = 'ticker-item';
    d.style.color = 'rgba(255,184,0,0.4)';
    d.textContent = 'Powerplay Windsor \u2014 Windsor-Essex sports coverage';
    stage.appendChild(d);
    stage.appendChild(makeSep());
    // duplicate
    var d2 = d.cloneNode(true);
    stage.appendChild(d2);
    stage.appendChild(makeSep());
  } else {
    // Build one full set of nodes, append twice
    var nodes = [];
    items.forEach(function(item){
      nodes.push(makeNode(item));
      nodes.push(makeSep());
    });
    nodes.forEach(function(n){ stage.appendChild(n); });
    nodes.forEach(function(n){ stage.appendChild(n.cloneNode(true)); });
  }

  // Measure AFTER nodes are in DOM using offsetWidth on each child
  // This is synchronous and accurate — no timeouts needed
  var children = stage.children;
  var half = 0;
  for(var i=0; i < children.length / 2; i++){
    half += children[i].offsetWidth;
  }
  loopWidth = half;

  // Start
  running = true;
  raf = requestAnimationFrame(tick);
}

function tick(t){
  if(!running) return;
  if(lastT !== null){
    var delta = (t - lastT) / 1000;
    if(delta > 0.1) delta = 0.1;
    x += SPEED * delta;
    if(loopWidth > 0 && x >= loopWidth) x -= loopWidth;
    stage.style.transform = 'translateX(-' + x.toFixed(1) + 'px)';
  }
  lastT = t;
  raf = requestAnimationFrame(tick);
}

function fetchSheet(){
  var url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet=Sheet1&t='+Date.now();
  fetch(url, {cache:'no-store'})
    .then(function(r){ return r.text(); })
    .then(function(text){
      var items = parseCSV(text);
      buildStage(items);
    })
    .catch(function(){ setTimeout(fetchSheet, 5000); });
}

fetchSheet();
setInterval(fetchSheet, 30000);
</script>
</body>
</html>
